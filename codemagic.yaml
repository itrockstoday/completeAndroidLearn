workflows:
  android-apk-workflow:
    name: Android APK Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: v22.14.0
      java: 17
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web assets
        script: npm run build
      - name: Capacitor Sync
        script: npx cap sync android
      - name: Setup Gradle Wrapper
        script: |
          cd android
          gradle wrapper
      - name: Build Android APK
        script: |
          set -e
          cd android
          chmod +x gradlew
          ./gradlew clean :app:assembleDebug --stacktrace --no-daemon --info
          echo "Build finished."
      - name: Locate Artifacts
        script: |
          echo "Scanning for all APKs..."
          find . -name "*.apk"
          echo "Scanning for all AABs..."
          find . -name "*.aab"
    artifacts:
      - "**/*.apk"
      - "**/*.aab"
    publishing:
      email:
        recipients:
          - jose@techbyjr.com
        notify:
          success: true
          failure: true
