workflows:
  android-apk-workflow:
    name: Android APK Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: v22.14.0
      java: 17
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web assets
        script: npm run build
      - name: Capacitor Sync
        script: npx cap sync android
      - name: Build Android APK
        script: |
          set -e
          cd android
          chmod +x gradlew || true
          
          # Use gradlew if jar exists, otherwise fallback to global gradle
          if [ -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "Using gradle-wrapper..."
            ./gradlew clean :app:assembleDebug --stacktrace --no-daemon --info
          else
            echo "gradle-wrapper.jar missing, using global gradle..."
            gradle clean :app:assembleDebug --stacktrace --no-daemon --info
          fi
          
          echo "Build finished. List of all files in android/app/build:"
          ls -R app/build || echo "Build directory not found"
      - name: Locate Artifacts
        script: |
          echo "Scanning for all APKs..."
          find . -name "*.apk"
          echo "Scanning for all AABs..."
          find . -name "*.aab"
    artifacts:
      - "**/*.apk"
      - "**/*.aab"
    publishing:
      email:
        recipients:
          - jose@techbyjr.com
        notify:
          success: true
          failure: true
