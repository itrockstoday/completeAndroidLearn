workflows:
  android-apk-workflow:
    name: Android APK Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: v22.14.0
      java: 17
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web assets
        script: npm run build
      - name: Capacitor Sync
        script: npx cap sync android
      - name: Build Android App
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
          mkdir -p ../artifacts
          find . -name "*.apk" -print
          find app/build/outputs/apk/debug -name "*.apk" -exec cp {} ../artifacts/RetroTerminal.apk \;
      - name: Export Artifacts
        script: |
          ls -R artifacts
    artifacts:
      - artifacts/*.apk
    publishing:
      email:
        recipients:
          - jose@techbyjr.com
        notify:
          success: true
          failure: true
