workflows:
  android-apk-workflow:
    name: Android APK Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: v22.14.0
      java: 17
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web assets
        script: npm run build
      - name: Capacitor Sync
        script: npx cap sync android
      - name: Build Android APK
        script: |
          set -e
          cd android
          chmod +x gradlew
          ./gradlew clean assembleDebug --stacktrace --no-daemon --info
      - name: Locate Artifacts
        script: |
          echo "Scanning for APKs..."
          find . -name "*.apk"
    artifacts:
      - android/app/build/outputs/apk/**/*.apk
    publishing:
      email:
        recipients:
          - jose@techbyjr.com
        notify:
          success: true
          failure: true
