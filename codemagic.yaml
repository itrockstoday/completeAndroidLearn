workflows:
  android-apk-workflow:
    name: Android APK Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: v22.14.0
      java: 17
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web assets
        script: npm run build
      - name: Capacitor Sync
        script: npx cap sync android
      - name: Build Android APK
        script: |
          set -e
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
      - name: Locate and Export Artifacts
        script: |
          mkdir -p artifacts
          echo "Listing all generated APKs:"
          find android/app/build/outputs -name "*.apk"
          # Aggressively copy any debug APK found to the artifacts folder
          find android/app/build/outputs/apk/debug -name "*.apk" -exec cp {} artifacts/RetroTerminal-Debug.apk \; || true
          # Fallback: search the entire android directory if the standard path failed
          if [ ! -f artifacts/RetroTerminal-Debug.apk ]; then
            find android -name "*-debug.apk" -exec cp {} artifacts/RetroTerminal-Debug.apk \; || true
          fi
    artifacts:
      - artifacts/*.apk
      - android/app/build/outputs/**/*.apk
    publishing:
      email:
        recipients:
          - jose@techbyjr.com
        notify:
          success: true
          failure: true
