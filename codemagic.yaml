workflows:
  flutter-android-workflow:
    name: Flutter Android Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Flutter build APK
        script: |
          flutter pub get
          # Inject the Flutter SDK path into local.properties so Gradle can find the plugins
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          flutter build apk --debug
          mkdir -p artifacts
          cp build/app/outputs/flutter-apk/app-debug.apk artifacts/RetroTerminal.apk
    artifacts:
      - artifacts/*.apk
    publishing:
      email:
        recipients:
          - jose@techbyjr.com

