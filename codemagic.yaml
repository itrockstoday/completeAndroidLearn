workflows:
  android-apk-workflow:
    name: Android APK Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: v22.14.0
      java: 17
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web assets
        script: npm run build
      - name: Capacitor Sync
        script: npx cap sync android
      - name: Build Android APK
        script: |
          set -e
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
      - name: Export Artifacts
        script: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/debug/*.apk artifacts/RetroTerminal.apk || true
    artifacts:
      - artifacts/*.apk
      - android/app/build/outputs/apk/debug/*.apk
    publishing:
      email:
        recipients:
          - jose@techbyjr.com
        notify:
          success: true
          failure: true
