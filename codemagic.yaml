workflows:
  android-apk-workflow:
    name: Android APK Build
    max_build_duration: 60
    instance_type: linux
    environment:
      node: v20.18.0
      java: 17
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build and Sync Capacitor
        script: npm run android:sync
      - name: Build Android APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace --no-daemon
      - name: Check for artifacts
        script: find . -name "*.apk"
    artifacts:
      - android/app/build/outputs/apk/**/*.apk
    publishing:
      email:
        recipients:
          - jose@techbyjr.com
        notify:
          success: true
          failure: true
