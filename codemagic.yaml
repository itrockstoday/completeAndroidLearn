workflows:
  flutter-android-workflow:
    name: Flutter Android Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Flutter build APK
        script: |
          mkdir -p android
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          flutter pub get
          flutter clean
          flutter build apk --debug
          mkdir -p artifacts
          find build/app/outputs/flutter-apk -name "*.apk" -exec cp {} artifacts/RetroTerminal.apk \;
    artifacts:
      - artifacts/*.apk
    publishing:
      email:
        recipients:
          - jose@techbyjr.com

